<!doctype html><html lang="pl"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="bp-card">
<style>
  .ttl{ font: var(--t-h4); color: var(--bp-ink-700); letter-spacing: var(--ls-body-tight); margin-bottom: 4px; }
  .sub{ font: var(--t-body-sm); color: var(--bp-ink-500); margin-bottom: 16px; }
  .btn{ display:inline-flex; align-items:center; justify-content: center; gap: 8px; height: 44px; padding: 0 22px; border-radius: var(--r-sm); border: 1px solid transparent; font: 700 14px/1 var(--f-display); letter-spacing: -.16px; cursor:pointer; }
  .btn-primary{ background: var(--bp-green-500); color: white; }
  .btn-secondary{ background: var(--bp-ink-700); color: white; }
  .btn-outline{ background: white; color: var(--bp-green-600); border-color: var(--bp-green-500); }
  .btn-ghost{ background: transparent; color: var(--bp-ink-700); }
  .btn-danger{ background: var(--bp-danger); color: white; }
  .row{ display:flex; flex-wrap: wrap; gap: 12px; align-items: center; }
</style>
<div class="ttl">Buttons — variants</div>
<div class="sub">Primary used once per section (the most-wanted action). Secondary, outline, ghost support it.</div>
<div class="row">
  <button class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 14.39 8.25 20 9.27l-4 3.9.94 5.49L12 16.27l-4.95 2.39L8 13.17l-4-3.9 5.61-1.02z"/></svg>Zapytaj AI</button>
  <button class="btn btn-primary">Zamów ofertę</button>
  <button class="btn btn-secondary">Pobierz PDF</button>
  <button class="btn btn-outline">Zobacz katalog</button>
  <button class="btn btn-ghost">Anuluj</button>
  <button class="btn btn-danger">Usuń</button>
</div>
</body></html>
