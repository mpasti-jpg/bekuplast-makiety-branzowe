<!doctype html><html lang="pl"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="bp-card bp-card-light">
<style>
  .ttl{ font: var(--t-h4); color: var(--bp-ink-700); letter-spacing: var(--ls-body-tight); margin-bottom: 4px; }
  .sub{ font: var(--t-body-sm); color: var(--bp-ink-500); margin-bottom: 16px; }
  .grid{ display:grid; grid-template-columns: repeat(5,1fr); gap: 18px; }
  .item{ display:flex; flex-direction: column; gap: 10px; align-items:center; }
  .box{ height: 60px; width: 100%; background: var(--bp-white); border-radius: var(--r-sm); }
  .nm{ font: var(--t-mono); color: var(--bp-ink-700); }
</style>
<div class="ttl">Shadow elevation</div>
<div class="sub">Subtle, industrial. No drama. Used only on interactive surfaces (card hover, dropdowns, toasts).</div>
<div class="grid">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="nm">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="nm">xl</div></div>
</div>
</body></html>
