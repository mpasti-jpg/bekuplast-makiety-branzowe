<!doctype html><html lang="pl"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="bp-card">
<style>
  .scale{ display:grid; grid-template-columns: repeat(10,1fr); gap: 6px; }
  .sw{ height: 96px; border-radius: var(--r-sm); padding: 8px 10px; display:flex; flex-direction: column; justify-content: space-between; color: var(--bp-ink-700); position: relative; border: 1px solid transparent; }
  .sw .w { font: var(--t-mono); opacity:.7; }
  .sw .hex { font: var(--t-mono); }
  .sw[data-on=dark]{ color: white; }
  .sw.anchor::after{ content:""; position:absolute; top:8px; right:8px; width:6px; height:6px; border-radius:999px; background: currentColor; opacity:.7; }
  .ttl{ font: var(--t-h4); color: var(--bp-ink-700); letter-spacing: var(--ls-body-tight); margin-bottom: 4px; }
  .sub{ font: var(--t-body-sm); color: var(--bp-ink-500); margin-bottom: 16px; }
</style>
<div class="ttl">Industrial Ink · anchors 700 / 500</div>
<div class="sub">Neutral scale. 700 = brand-dark (body/heads). 500 = brand-gray (secondary text). 25 = section bg.</div>
<div class="scale">
  <div class="sw" style="background:var(--bp-ink-25);border-color:var(--bp-ink-100)"><div class="w">25</div><div class="hex">#F3F3F3</div></div>
  <div class="sw" style="background:var(--bp-ink-50)"><div class="w">50</div><div class="hex">#F0F0F0</div></div>
  <div class="sw" style="background:var(--bp-ink-100)"><div class="w">100</div><div class="hex">#ECECEC</div></div>
  <div class="sw" style="background:var(--bp-ink-200)"><div class="w">200</div><div class="hex">#DEDEDE</div></div>
  <div class="sw" style="background:var(--bp-ink-300)"><div class="w">300</div><div class="hex">#C2C2C2</div></div>
  <div class="sw" data-on="dark" style="background:var(--bp-ink-400)"><div class="w">400</div><div class="hex">#9A9A9A</div></div>
  <div class="sw anchor" data-on="dark" style="background:var(--bp-ink-500)"><div class="w">500</div><div class="hex">#717171</div></div>
  <div class="sw" data-on="dark" style="background:var(--bp-ink-600)"><div class="w">600</div><div class="hex">#5A5A5A</div></div>
  <div class="sw anchor" data-on="dark" style="background:var(--bp-ink-700)"><div class="w">700</div><div class="hex">#434343</div></div>
  <div class="sw" data-on="dark" style="background:var(--bp-ink-900)"><div class="w">900</div><div class="hex">#1D1D1D</div></div>
</div>
</body></html>
