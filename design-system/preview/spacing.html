<!doctype html><html lang="pl"><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="bp-card">
<style>
  .ttl{ font: var(--t-h4); color: var(--bp-ink-700); letter-spacing: var(--ls-body-tight); margin-bottom: 4px; }
  .sub{ font: var(--t-body-sm); color: var(--bp-ink-500); margin-bottom: 16px; }
  .rows{ display:flex; flex-direction: column; gap: 8px; }
  .row{ display:grid; grid-template-columns: 80px 60px 1fr; gap: 16px; align-items:center; }
  .nm{ font: var(--t-mono); color: var(--bp-ink-700); }
  .px{ font: var(--t-mono); color: var(--bp-ink-500); text-align: right; }
  .bar{ height: 14px; background: var(--bp-green-200); border-radius: 2px; }
</style>
<div class="ttl">Spacing — 4 pt grid</div>
<div class="sub">Token base <code style="font:var(--t-mono);background:var(--bp-ink-25);padding:1px 6px;border-radius:3px">--s-4 = 16 px</code>. All other steps are multiples.</div>
<div class="rows">
  <div class="row"><span class="nm">--s-1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="nm">--s-2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="nm">--s-3</span><span class="px">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="nm">--s-4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="nm">--s-5</span><span class="px">20</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="nm">--s-6</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="nm">--s-8</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="nm">--s-10</span><span class="px">40</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="nm">--s-12</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="nm">--s-16</span><span class="px">64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="nm">--s-20</span><span class="px">80</span><span class="bar" style="width:80px"></span></div>
  <div class="row"><span class="nm">--s-24</span><span class="px">96</span><span class="bar" style="width:96px"></span></div>
</div>
</body></html>
